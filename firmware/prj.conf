# Core
CONFIG_MAIN_STACK_SIZE=4096
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=4096

# Console output (RTT)
CONFIG_PRINTK=y
CONFIG_CONSOLE=y
CONFIG_USE_SEGGER_RTT=y
CONFIG_RTT_CONSOLE=y
CONFIG_UART_CONSOLE=n

# Logging
CONFIG_LOG=y
CONFIG_LOG_DEFAULT_LEVEL=3

# ADC
CONFIG_ADC=y

# I2C
CONFIG_I2C=y

# Sensor
CONFIG_SENSOR=y

# LSM6DSL
CONFIG_LSM6DSL=y

# GPIO (for IMU interrupt)
CONFIG_GPIO=y

# Bluetooth
CONFIG_BT=y
CONFIG_BT_PERIPHERAL=y
CONFIG_BT_DEVICE_NAME="nRF54_Sensor"